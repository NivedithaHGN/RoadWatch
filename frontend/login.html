<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROADWATCH - Secure Authentication</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1 onclick="window.location.href='index.html'" style="cursor:pointer;">ROADWATCH</h1>
      <p id="authSubtitle">Access Infrastructure Auditing Console</p>
    </div>

    <div class="auth-tabs">
      <div class="auth-tab active" id="tabLogin" onclick="setAuthTab('login')">Sign In</div>
      <div class="auth-tab" id="tabRegister" onclick="setAuthTab('register')">Register</div>
    </div>

    <!-- Login Form -->
    <form id="loginForm" style="display: flex; flex-direction: column; gap: 14px;">
      <div style="display: flex; flex-direction: column; gap: 8px; width: 100%;">
        <label style="font-size: 0.85rem; color: var(--text-muted); font-weight:600;">Email Address</label>
        <input type="email" id="loginEmail" placeholder="user@roadwatch.org" class="elegant-input" required>
      </div>

      <div style="display: flex; flex-direction: column; gap: 8px; width: 100%;">
        <label style="font-size: 0.85rem; color: var(--text-muted); font-weight:600;">Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" class="elegant-input" required>
      </div>

      <p id="loginError" style="color: var(--color-danger); font-size: 0.8rem; display: none; text-align: center; font-weight:700;"></p>

      <button type="submit" class="btn-primary auth-btn" style="margin-top: 20px;">Sign In to Dashboard</button>
    </form>

    <!-- Registration Form -->
    <form id="registerForm" style="display: none; flex-direction: column; gap: 14px;">
      <div style="display: flex; flex-direction: column; gap: 8px;">
        <label style="font-size: 0.85rem; color: var(--text-muted); font-weight:600;">Full Name</label>
        <input type="text" id="regFullName" placeholder="e.g. Samuel L. Jackson" class="elegant-input" required>
      </div>

      <div style="display: flex; flex-direction: column; gap: 8px;">
        <label style="font-size: 0.85rem; color: var(--text-muted); font-weight:600;">Email Address</label>
        <input type="email" id="regEmail" placeholder="user@roadwatch.org" class="elegant-input" required>
      </div>

      <div style="display: flex; flex-direction: column; gap: 8px;">
        <label style="font-size: 0.85rem; color: var(--text-muted); font-weight:600;">Choose Password</label>
        <input type="password" id="regPassword" placeholder="••••••••" class="elegant-input" required>
      </div>

      <div style="display: flex; flex-direction: column; gap: 8px;">
        <label style="font-size: 0.85rem; color: var(--text-muted); font-weight:600;">Access Authorization Level</label>
        <select id="regRole" class="elegant-input" style="width: 100%;">
          <option value="public">Public Citizen Access</option>
        </select>
        <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 4px;">
          🔒 Government official accounts are pre-authorised and cannot be self-registered.
        </p>
      </div>

      <p id="registerError" style="color: var(--color-danger); font-size: 0.8rem; display: none; text-align: center; font-weight:700;"></p>
      <p id="registerSuccess" style="color: var(--color-success); font-size: 0.8rem; display: none; text-align: center; font-weight:700;"></p>

      <button type="submit" class="btn-primary auth-btn" style="margin-top: 20px;">Create Secure Account</button>
    </form>

    <div class="auth-footer">
      <p onclick="window.location.href='index.html'" style="cursor:pointer; display:inline-block; border-bottom:1px dashed var(--color-primary); color:var(--color-primary); font-weight:700;">
        Back to Public Dashboard
      </p>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
